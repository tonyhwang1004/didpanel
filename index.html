<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김엄마 관리형 독서실 - 질의응답 안내</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { background: #0f172a; display: flex; justify-content: center; align-items: center; }
        .slideshow { width: 100%; height: 100%; position: relative; display: flex; justify-content: center; align-items: center; }
        .slide {
            display: none; width: 100%; height: 100%;
            position: absolute; top: 0; left: 0;
            opacity: 0; transition: opacity 1.2s ease;
        }
        .slide.active { display: flex; opacity: 1; justify-content: center; align-items: center; }
        .slide.fade-out { display: flex; opacity: 0; }
        .slide img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .progress-bar {
            position: absolute; bottom: 0; left: 0; height: 5px;
            background: linear-gradient(90deg, #f59e0b, #f97316);
            width: 0%; z-index: 100;
        }
        .indicators {
            position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 100;
        }
        .ind {
            width: 12px; height: 12px; border-radius: 50%;
            background: rgba(255,255,255,0.2); cursor: pointer; transition: all 0.3s;
        }
        .ind.active {
            background: #f59e0b; transform: scale(1.3);
            box-shadow: 0 0 8px rgba(245,158,11,0.5);
        }
    </style>
</head>
<body>
    <div class="slideshow">
        <div class="slide active"><img src="sangjeom.png" alt="상점 기준 안내"></div>
        <div class="slide"><img src="cashback.png" alt="캐시백 제도 안내"></div>
        <div class="slide"><img src="slide1.png" alt="타이틀"></div>
        <div class="slide"><img src="slide2.png" alt="온라인 1/4"></div>
        <div class="slide"><img src="slide3.png" alt="온라인 2/4"></div>
        <div class="slide"><img src="slide4.png" alt="온라인 3/4"></div>
        <div class="slide"><img src="slide5.png" alt="온라인 4/4"></div>
        <div class="slide"><img src="slide6.png" alt="대면 1/2"></div>
        <div class="slide"><img src="slide7.png" alt="대면 2/2"></div>
        <div class="progress-bar" id="pb"></div>
        <div class="indicators" id="ind"></div>
    </div>
    <script>
        const S=document.querySelectorAll('.slide'), ind=document.getElementById('ind'),
              pb=document.getElementById('pb'), T=S.length, DUR=10000;
        let c=0, tm=null;
        S.forEach((_,i)=>{const d=document.createElement('div');d.className='ind'+(i===0?' active':'');d.onclick=()=>go(i);ind.appendChild(d)});
        function show(n){const p=c;c=((n%T)+T)%T;S[p].classList.add('fade-out');S[p].classList.remove('active');setTimeout(()=>S[p].classList.remove('fade-out'),100);S[c].classList.add('active');document.querySelectorAll('.ind').forEach((d,i)=>d.classList.toggle('active',i===c));prog()}
        function prog(){pb.style.transition='none';pb.style.width='0%';requestAnimationFrame(()=>{pb.style.transition='width '+DUR+'ms linear';pb.style.width='100%'});clearTimeout(tm);tm=setTimeout(()=>show(c+1),DUR)}
        function go(n){clearTimeout(tm);show(n)}
        document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();go(c+1)}if(e.key==='ArrowLeft')go(c-1)});
        let tx=0;document.addEventListener('touchstart',e=>tx=e.changedTouches[0].screenY);
        document.addEventListener('touchend',e=>{const d=e.changedTouches[0].screenY-tx;if(d<-50)go(c+1);if(d>50)go(c-1)});
        prog();
    </script>
</body>
</html>
