<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026김엄마겨울방학캠프안내</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slideshow-container {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slide {
            display: none;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            animation: fadeIn 1s ease-in-out;
        }

        .slide.active {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slide img {
            max-width: 110%;
            max-height: 110%;
            object-fit: contain;
            transform: scale(1.1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .indicators {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 100;
        }

        .indicator {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .indicator.active {
            background: rgba(255, 255, 255, 0.9);
            transform: scale(1.3);
        }
    </style>
</head>
<body>
    <div class="slideshow-container">
        <!-- 슬라이드 1 -->
        <div class="slide active">
            <img src="/static/images/event1.png" alt="Event 1">
        </div>

        <!-- 슬라이드 2 -->
        <div class="slide">
            <img src="/static/images/event2.png" alt="Event 2">
        </div>

        <!-- 슬라이드 3 -->
        <div class="slide">
            <img src="/static/images/event3.png" alt="Event 3">
        </div>

        <!-- 슬라이드 4 -->
        <div class="slide">
            <img src="/static/images/event4.png" alt="Event 4">
        </div>

        <!-- 슬라이드 5 -->
        <div class="slide">
            <img src="/static/images/event5.png" alt="Event 5">
        </div>

        <!-- 슬라이드 6 -->
        <div class="slide">
            <img src="/static/images/event6.png" alt="Event 6">
        </div>

        <!-- 슬라이드 인디케이터 -->
        <div class="indicators">
            <div class="indicator active" onclick="goToSlide(0)"></div>
            <div class="indicator" onclick="goToSlide(1)"></div>
            <div class="indicator" onclick="goToSlide(2)"></div>
            <div class="indicator" onclick="goToSlide(3)"></div>
            <div class="indicator" onclick="goToSlide(4)"></div>
            <div class="indicator" onclick="goToSlide(5)"></div>
        </div>
    </div>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const indicators = document.querySelectorAll('.indicator');
        const totalSlides = slides.length;
        const slideInterval = 5000;
        let autoPlayTimer;

        function showSlide(n) {
            if (n >= totalSlides) {
                currentSlide = 0;
            } else if (n < 0) {
                currentSlide = totalSlides - 1;
            } else {
                currentSlide = n;
            }

            slides.forEach(slide => {
                slide.classList.remove('active');
            });

            indicators.forEach(indicator => {
                indicator.classList.remove('active');
            });

            slides[currentSlide].classList.add('active');
            indicators[currentSlide].classList.add('active');
        }

        function nextSlide() {
            showSlide(currentSlide + 1);
        }

        function prevSlide() {
            showSlide(currentSlide - 1);
        }

        function goToSlide(n) {
            showSlide(n);
            resetAutoPlay();
        }

        function startAutoPlay() {
            autoPlayTimer = setInterval(nextSlide, slideInterval);
        }

        function resetAutoPlay() {
            clearInterval(autoPlayTimer);
            startAutoPlay();
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                prevSlide();
                resetAutoPlay();
            }
            if (e.key === 'ArrowRight' || e.key === ' ') {
                e.preventDefault();
                nextSlide();
                resetAutoPlay();
            }
        });

        let touchStartX = 0;
        let touchEndX = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        });

        document.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        });

        function handleSwipe() {
            if (touchEndX < touchStartX - 50) {
                nextSlide();
                resetAutoPlay();
            }
            if (touchEndX > touchStartX + 50) {
                prevSlide();
                resetAutoPlay();
            }
        }

        window.addEventListener('load', () => {
            startAutoPlay();
        });

        let isPaused = false;
        document.querySelector('.slideshow-container').addEventListener('click', (e) => {
            if (e.target.classList.contains('indicator')) return;

            if (isPaused) {
                startAutoPlay();
                isPaused = false;
            } else {
                clearInterval(autoPlayTimer);
                isPaused = true;
            }
        });
    </script>
</body>
</html>
